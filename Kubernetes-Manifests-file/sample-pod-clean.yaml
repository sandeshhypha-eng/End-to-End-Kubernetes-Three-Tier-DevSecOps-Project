---
apiVersion: v1
kind: Pod
metadata:
  name: sample-app-pod
  namespace: default
  labels:
    app: sample-app
    version: "1.0"
    environment: development
    tier: backend
  annotations:
    description: "This is a sample pod demonstrating Kubernetes manifest structure"
    author: "DevOps Team"
    created-date: "2025-12-22"

spec:
  restartPolicy: Always
  terminationGracePeriodSeconds: 30

  containers:
    - name: app-container
      image: nginx:latest
      imagePullPolicy: IfNotPresent
      ports:
        - name: http
          containerPort: 80
          protocol: TCP
        - name: https
          containerPort: 443
          protocol: TCP

      env:
        - name: APP_NAME
          value: "sample-app"
        - name: LOG_LEVEL
          value: "INFO"
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: db_host
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

      livenessProbe:
        httpGet:
          path: /health
          port: 80
        initialDelaySeconds: 15
        periodSeconds: 20
        timeoutSeconds: 5
        failureThreshold: 3

      readinessProbe:
        httpGet:
          path: /ready
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 3

      volumeMounts:
        - name: config-volume
          mountPath: /etc/config
          readOnly: true
        - name: log-volume
          mountPath: /var/log/app

      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        readOnlyRootFilesystem: false
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
          add:
            - NET_BIND_SERVICE

      lifecycle:
        postStart:
          exec:
            command: ["/bin/sh", "-c", "echo 'Container started' > /tmp/start.txt"]
        preStop:
          exec:
            command: ["/bin/sh", "-c", "sleep 15"]

  volumes:
    - name: config-volume
      configMap:
        name: app-config
        defaultMode: 0644
    - name: log-volume
      emptyDir:
        sizeLimit: 1Gi

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: node-type
                operator: In
                values:
                  - app-node

  serviceAccountName: default

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app-deployment
  namespace: default
  labels:
    app: sample-app

spec:
  replicas: 3
  selector:
    matchLabels:
      app: sample-app

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: sample-app
        version: "1.0"

    spec:
      restartPolicy: Always
      containers:
        - name: app-container
          image: nginx:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: sample-app-service
  namespace: default

spec:
  type: ClusterIP
  selector:
    app: sample-app

  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default

data:
  db_host: "mongodb://localhost:27017"
  db_name: "sample_app_db"
  app_mode: "production"

---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: default

type: Opaque

data:
  password: cGFzc3dvcmQxMjM=
  username: YWRtaW4=

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sample-app-hpa
  namespace: default

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sample-app-deployment

  minReplicas: 2
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Min

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sample-app-network-policy
  namespace: default

spec:
  podSelector:
    matchLabels:
      app: sample-app

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443

    - from:
        - podSelector:
            matchLabels:
              tier: frontend
      ports:
        - protocol: TCP
          port: 8080

    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090

    - from:
        - ipBlock:
            cidr: 10.0.0.0/8
            except:
              - 10.1.1.1
              - 10.1.1.2
      ports:
        - protocol: TCP
          port: 443

  egress:
    - to:
        - podSelector:
            matchLabels:
              app: database
      ports:
        - protocol: TCP
          port: 27017

    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: default

spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ingress
  namespace: default

spec:
  podSelector:
    matchLabels:
      tier: backend

  policyTypes:
    - Ingress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443

    - from:
        - podSelector:
            matchLabels:
              app: nginx-ingress
      ports:
        - protocol: TCP
          port: 8080
